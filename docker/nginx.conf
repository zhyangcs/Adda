server {
    listen 80;
    server_name _;

    # Hashed assets - immutable long cache
    location /assets/ {
        root /adda/static;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Static files - no cache
    location ~* \.(png|jpg|jpeg|svg|ico|gif|woff2?)$ {
        root /adda/static;
        try_files $uri =404;
        add_header Cache-Control "no-store, must-revalidate";
    }

    # Flask API routes - proxy to backend
    location ~ ^/(check-format|get-treejson|next-step|feature-search|test-performance|py2sql-ast|py2sql-dag|gen-model|stop-task|clear-task|auto-step|performance-evaluation|get-notifications|check-task-status|train-node-model|manual-test-websocket|api)/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        client_max_body_size 100m;
    }

    # Socket.IO WebSocket support
    location /socket.io/ {
        proxy_pass http://127.0.0.1:5000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # SPA fallback - serve index.html for all unmatched routes
    location / {
        root /adda/static;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }
}
