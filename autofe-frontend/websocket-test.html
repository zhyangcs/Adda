<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .connected {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .disconnected {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .message {
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            padding: 10px;
            margin: 5px 0;
            border-radius: 3px;
        }
        .thinking {
            background-color: #e3f2fd;
            border-color: #2196f3;
        }
        .status-update {
            background-color: #e8f5e8;
            border-color: #4caf50;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background-color: #0056b3;
        }
        #messages {
            height: 400px;
            overflow-y: auto;
            border: 1px solid #ccc;
            padding: 10px;
            background-color: #ffffff;
        }
    </style>
</head>
<body>
    <h1>WebSocket连接测试</h1>

    <div id="connection-status" class="status disconnected">
        未连接
    </div>

    <div>
        <button onclick="connect()">连接</button>
        <button onclick="disconnect()">断开连接</button>
        <button onclick="testAgentStatus()">测试Agent状态</button>
        <button onclick="triggerBackendTest()">触发后端测试</button>
        <button onclick="clearMessages()">清空消息</button>
    </div>

    <h3>消息日志:</h3>
    <div id="messages"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket = null;

        function updateStatus(connected) {
            const statusDiv = document.getElementById('connection-status');
            if (connected) {
                statusDiv.className = 'status connected';
                statusDiv.textContent = '已连接到WebSocket服务器';
            } else {
                statusDiv.className = 'status disconnected';
                statusDiv.textContent = '未连接';
            }
        }

        function addMessage(message, type = '') {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.innerHTML = `<strong>${new Date().toLocaleTimeString()}</strong>: ${JSON.stringify(message, null, 2)}`;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function connect() {
            if (socket && socket.connected) {
                addMessage('已经连接', 'status-update');
                return;
            }

            socket = io('http://localhost:5000', {
                transports: ['websocket', 'polling']
            });

            socket.on('connect', () => {
                updateStatus(true);
                addMessage('连接成功！', 'status-update');
            });

            socket.on('disconnect', (reason) => {
                updateStatus(false);
                addMessage(`连接断开: ${reason}`, 'status-update');
            });

            socket.on('connect_error', (error) => {
                updateStatus(false);
                addMessage(`连接错误: ${error}`, 'status-update');
            });

            socket.on('agent_status_update', (data) => {
                addMessage(data, 'status-update');
            });

            socket.on('agent_thinking', (data) => {
                addMessage(data, 'thinking');
            });

            socket.on('system_notification', (data) => {
                addMessage(data, 'status-update');
            });

            socket.on('status', (data) => {
                addMessage(data, 'status-update');
            });
        }

        function disconnect() {
            if (socket) {
                socket.disconnect();
                socket = null;
            }
        }

        function testAgentStatus() {
            if (socket && socket.connected) {
                addMessage('手动测试：Agent状态更新应该从后端发送', 'thinking');
            } else {
                addMessage('请先连接WebSocket', 'status-update');
            }
        }

        async function triggerBackendTest() {
            try {
                const response = await fetch('/manual-test-websocket/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                const result = await response.json();
                addMessage(result, 'status-update');
            } catch (error) {
                addMessage(`后端测试请求失败: ${error}`, 'status-update');
            }
        }

        function clearMessages() {
            document.getElementById('messages').innerHTML = '';
        }

        // 页面加载时自动连接
        window.onload = function() {
            connect();
        };
    </script>
</body>
</html>
